{% extends "base.html" %}
{% block title %}회원가입{% endblock %}
{% block content %}
<h2>회원가입</h2>
<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  사용자명: <input type="text" name="username" minlength="3" maxlength="30" pattern="[A-Za-z0-9_-]{3,30}" required><br>
  <p>사용자명은 3~30자의 영문자, 숫자, 밑줄, 하이픈만 사용할 수 있습니다.</p>
  비밀번호: <input type="password" name="password" minlength="8" maxlength="12" required><br>
  <p>비밀번호는 8~12자이며 영문자, 숫자, 특수문자를 각각 하나 이상 포함해야 합니다.</p>
  <button type="submit">회원가입</button>
</form>
{% endblock %}
