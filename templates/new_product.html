{% extends "base.html" %}
{% block title %}새 상품 등록{% endblock %}
{% block content %}
<h2>상품 등록</h2>
<form method="post" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  상품명: <input type="text" name="title" maxlength="100" required><br>
  설명: <br>
  <textarea name="description" rows="4" cols="50" maxlength="2000" required></textarea><br>
  가격: <input type="number" name="price" min="0" max="1000000000" step="1" required><br>
  <label for="image">대표 이미지 (선택)</label>
  <input id="image" type="file" name="image" accept=".png,.jpg,.jpeg,.gif,.webp,image/png,image/jpeg,image/gif,image/webp">
  <p class="form-help">PNG, JPEG, GIF, WebP 형식의 5MB 이하 이미지</p>
  <button type="submit">등록하기</button>
</form>
{% endblock %}
